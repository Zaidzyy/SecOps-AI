# SecOps-AI CI (Phase 5).
#
# Three jobs, three failure classes:
#   tests  -- the full pytest suite (210 tests), on the repo's Python (3.13,
#             matching the Dockerfile base and the pickle-serialization env).
#             Training deps are installed too: the suite includes the Conv1D
#             baseline and the feature-alignment tests, which need
#             TensorFlow/pandas. Fully self-contained: the alignment tests
#             run against the committed 452-row fixture + shipped models --
#             no dataset download, no CICIDS_PARQUET, no API keys (Groq and
#             the webhook are mocked in tests).
#   lint   -- ruff, critical rules only (syntax errors, undefined names).
#             Deliberately not a style gate.
#   docker -- build the image, then IMPORT the app inside it and boot it to
#             an answering /login page. This exists because the Dockerfile
#             lists runtime modules explicitly, and Features 1-3 shipped
#             without adding theirs to the COPY line -- an image that built
#             fine and crashed at boot. Import + boot is the drift catcher.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-train.txt
      - name: Install runtime + training/test dependencies
        run: pip install -r requirements.txt -r requirements-train.txt
      - name: Run test suite
        run: python -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Ruff (critical rules only)
        run: |
          pip install ruff
          ruff check --select E9,F63,F7,F82 .

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t secops-ai:ci .
      - name: Import smoke (catches COPY/import drift)
        # Importing app_groq pulls in every runtime module (alerts, auth,
        # cnn_engine, enrichment, migrations, pipeline, rag, reports,
        # storage, triage, ...) and loads the shipped model. A module
        # missing from the Dockerfile's COPY line fails HERE, not at a
        # user's first boot.
        run: >
          docker run --rm --entrypoint python
          -e SECOPS_DB=/tmp/ci-import.db
          secops-ai:ci
          -c "import app_groq; print('import OK')"
      - name: Boot smoke (container serves /login)
        run: |
          docker run -d --name secops-ci -p 5000:5000 \
            -e SECOPS_SECRET_KEY=ci-smoke-only \
            -e SECOPS_SEED_DEMO=0 \
            secops-ai:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/login >/dev/null 2>&1; then
              echo "login page answering"; exit 0
            fi
            sleep 2
          done
          echo "container never served /login"; docker logs secops-ci; exit 1
      - name: Container logs (always)
        if: always()
        run: docker logs secops-ci || true
      - name: Cleanup
        if: always()
        run: docker rm -f secops-ci || true
