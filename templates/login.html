<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in &mdash; SecOps-AI Console</title>
    <!-- Self-contained on purpose: no CDN, same rule as the console page. -->
    <style>
        :root {
            --bg: #0b1220; --panel: #121b2c; --line: #22304a;
            --text: #dbe4f3; --dim: #8194b3; --accent: #4da3ff;
            --error: #ff6b7a; --success: #43d9a3;
        }
        * { box-sizing: border-box; margin: 0; }
        body {
            background: var(--bg); color: var(--text);
            font: 15px/1.5 "Segoe UI", system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 16px;
        }
        .auth-card {
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 10px; padding: 32px; width: 100%; max-width: 380px;
        }
        .auth-card h1 { font-size: 18px; letter-spacing: .08em; margin-bottom: 4px; }
        .auth-card .sub { color: var(--dim); font-size: 12px; margin-bottom: 22px; }
        label { display: block; font-size: 12px; color: var(--dim); margin: 14px 0 6px; }
        input {
            width: 100%; padding: 10px 12px; border-radius: 6px;
            border: 1px solid var(--line); background: var(--bg);
            color: var(--text); font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            width: 100%; margin-top: 20px; padding: 10px;
            border: none; border-radius: 6px; cursor: pointer;
            background: var(--accent); color: #06101f;
            font-size: 14px; font-weight: 600;
        }
        button:hover { filter: brightness(1.1); }
        .alt { margin-top: 16px; font-size: 13px; color: var(--dim); text-align: center; }
        .alt a { color: var(--accent); text-decoration: none; }
        .flash { border-radius: 6px; padding: 9px 12px; font-size: 13px; margin-bottom: 8px; }
        .flash.error { background: rgba(255,107,122,.12); color: var(--error); }
        .flash.success { background: rgba(67,217,163,.12); color: var(--success); }
    </style>
</head>
<body>
    <main class="auth-card">
        <h1>SECOPS-AI</h1>
        <p class="sub">flow detection console &mdash; operator sign in</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Sign in</button>
        </form>
        <p class="alt">No account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
    </main>
</body>
</html>
